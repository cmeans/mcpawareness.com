<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 80" width="440" height="80">
  <!-- Radar/signal icon - larger version -->
  <g transform="translate(36, 40)">
    <!-- Outer arc -->
    <path d="M -22 11 A 26 26 0 0 1 -22 -11" fill="none" stroke="#85B7EB" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <!-- Middle arc -->
    <path d="M -15 8 A 18 18 0 0 1 -15 -8" fill="none" stroke="#85B7EB" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <!-- Inner arc -->
    <path d="M -8 5 A 10 10 0 0 1 -8 -5" fill="none" stroke="#85B7EB" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="#85B7EB"/>
  </g>
  <!-- Wordmark using CSS web font with fallback -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300&amp;display=swap');
    .wordmark { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>
  <text x="68" y="55" class="wordmark" font-size="48" font-weight="300" letter-spacing="1" fill="#85B7EB">awareness</text>
</svg>
