<svg width="200" viewBox="-150 -50 300 100" xmlns="http://www.w3.org/2000/svg">

<!-- Data stream paths (static) -->
<path id="streamL1" d="M-138,-44 C-112,-38 -84,-20 -64,-2" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="streamL2" d="M-148,-14 C-116,-10 -84,-4 -64,0" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="streamL3" d="M-138,22 C-112,18 -84,10 -64,2" fill="none" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round"/>
<path id="streamR1" d="M138,-44 C112,-38 84,-20 64,-2" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="streamR2" d="M148,-14 C116,-10 84,-4 64,0" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="streamR3" d="M138,22 C112,18 84,10 64,2" fill="none" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round"/>

<!-- Left side, first wave -->
<circle r="2.2" fill="#B5D4F4">
  <animateMotion dur="2.4s" repeatCount="indefinite" begin="0s"><mpath href="#streamL1"/></animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.4s" repeatCount="indefinite" begin="0s"/>
  <animate attributeName="r" values="1.5;3.2;2.0;3.8;1.8" dur="11.3s" repeatCount="indefinite" begin="0s"/>
</circle>
<circle r="3.8" fill="#85B7EB">
  <animateMotion dur="4.1s" repeatCount="indefinite" begin="1.7s"><mpath href="#streamL2"/></animateMotion>
  <animate attributeName="opacity" values="0;1;1;0" dur="4.1s" repeatCount="indefinite" begin="1.7s"/>
  <animate attributeName="r" values="3.8;2.0;4.2;1.6;3.0" dur="13.7s" repeatCount="indefinite" begin="0.4s"/>
</circle>
<circle r="2.2" fill="#B5D4F4">
  <animateMotion dur="2.9s" repeatCount="indefinite" begin="3.4s"><mpath href="#streamL3"/></animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.9s" repeatCount="indefinite" begin="3.4s"/>
  <animate attributeName="r" values="2.2;4.0;1.4;2.8;3.6;2.2" dur="9.1s" repeatCount="indefinite" begin="1.1s"/>
</circle>

<!-- Left side, second wave -->
<circle r="1.8" fill="#85B7EB">
  <animateMotion dur="3.7s" repeatCount="indefinite" begin="5.2s"><mpath href="#streamL1"/></animateMotion>
  <animate attributeName="opacity" values="0;0.7;0.7;0" dur="3.7s" repeatCount="indefinite" begin="5.2s"/>
  <animate attributeName="r" values="1.8;3.4;2.6;1.2;2.8" dur="10.9s" repeatCount="indefinite" begin="2.3s"/>
</circle>
<circle r="2.8" fill="#B5D4F4">
  <animateMotion dur="2.1s" repeatCount="indefinite" begin="7.8s"><mpath href="#streamL2"/></animateMotion>
  <animate attributeName="opacity" values="0;0.85;0.85;0" dur="2.1s" repeatCount="indefinite" begin="7.8s"/>
  <animate attributeName="r" values="2.8;1.6;3.6;2.2;4.0;2.8" dur="14.3s" repeatCount="indefinite" begin="3.7s"/>
</circle>

<!-- Right side, first wave -->
<circle r="3.8" fill="#85B7EB">
  <animateMotion dur="3.3s" repeatCount="indefinite" begin="0.9s"><mpath href="#streamR1"/></animateMotion>
  <animate attributeName="opacity" values="0;1;1;0" dur="3.3s" repeatCount="indefinite" begin="0.9s"/>
  <animate attributeName="r" values="3.8;1.8;3.2;4.4;2.4" dur="12.1s" repeatCount="indefinite" begin="0.7s"/>
</circle>
<circle r="3.8" fill="#85B7EB">
  <animateMotion dur="2.6s" repeatCount="indefinite" begin="4.3s"><mpath href="#streamR2"/></animateMotion>
  <animate attributeName="opacity" values="0;1;1;0" dur="2.6s" repeatCount="indefinite" begin="4.3s"/>
  <animate attributeName="r" values="3.8;2.4;1.4;3.6;2.8;3.8" dur="15.7s" repeatCount="indefinite" begin="1.9s"/>
</circle>
<circle r="2.2" fill="#B5D4F4">
  <animateMotion dur="4.7s" repeatCount="indefinite" begin="2.1s"><mpath href="#streamR3"/></animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="4.7s" repeatCount="indefinite" begin="2.1s"/>
  <animate attributeName="r" values="2.2;3.8;1.6;4.2;2.0" dur="11.9s" repeatCount="indefinite" begin="4.6s"/>
</circle>

<!-- Right side, second wave -->
<circle r="2.0" fill="#B5D4F4">
  <animateMotion dur="2.8s" repeatCount="indefinite" begin="6.5s"><mpath href="#streamR1"/></animateMotion>
  <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2.8s" repeatCount="indefinite" begin="6.5s"/>
  <animate attributeName="r" values="2.0;3.6;1.4;2.8;4.0;2.0" dur="13.3s" repeatCount="indefinite" begin="5.8s"/>
</circle>
<circle r="3.2" fill="#85B7EB">
  <animateMotion dur="3.9s" repeatCount="indefinite" begin="8.6s"><mpath href="#streamR3"/></animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.9s" repeatCount="indefinite" begin="8.6s"/>
  <animate attributeName="r" values="3.2;1.8;4.4;2.6;1.2;3.2" dur="10.3s" repeatCount="indefinite" begin="7.2s"/>
</circle>

<!-- Eye outline -->
<path d="M-64,0 C-60,-16 -34,-38 0,-38 C34,-38 60,-16 64,0 C60,16 34,38 0,38 C-34,38 -60,16 -64,0Z" fill="none" stroke="#85B7EB" stroke-width="2.8"/>

<!-- Iris -->
<circle cx="0" cy="0" r="19" fill="none" stroke="#85B7EB" stroke-width="1.8"/>
<circle cx="0" cy="0" r="13" fill="none" stroke="#6AAAE6" stroke-width="0.9"/>

<!-- Pupil fill -->
<circle cx="0" cy="0" r="7" fill="#B5D4F4"/>

<!-- Pupil (dark) — looks around at incoming data -->
<circle r="2.5" fill="#1a1a1a">
  <animate attributeName="cx" values="3;-5;-4;4;5;3;-3;3" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  <animate attributeName="cy" values="-3;-4;3;-3;-2;3;-1;-3" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
</circle>

</svg>
