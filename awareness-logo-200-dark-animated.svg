<svg width="200" viewBox="-150 -50 300 100" xmlns="http://www.w3.org/2000/svg">

<!-- Data stream paths (static) -->
<path id="sL1" d="M-138,-44 C-112,-38 -84,-20 -64,-2" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="sL2" d="M-148,-14 C-116,-10 -84,-4 -64,0" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="sL3" d="M-138,22 C-112,18 -84,10 -64,2" fill="none" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round"/>
<path id="sR1" d="M138,-44 C112,-38 84,-20 64,-2" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="sR2" d="M148,-14 C116,-10 84,-4 64,0" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="sR3" d="M138,22 C112,18 84,10 64,2" fill="none" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round"/>

<!-- Stream L1: three fixed-size dots, different speeds and offsets -->
<circle r="2.0" fill="#B5D4F4">
  <animateMotion dur="2.4s" repeatCount="indefinite" begin="0s"><mpath href="#sL1"/></animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.4s" repeatCount="indefinite" begin="0s"/>
</circle>
<circle r="3.6" fill="#85B7EB">
  <animateMotion dur="3.7s" repeatCount="indefinite" begin="5.2s"><mpath href="#sL1"/></animateMotion>
  <animate attributeName="opacity" values="0;0.8;0.8;0" dur="3.7s" repeatCount="indefinite" begin="5.2s"/>
</circle>
<circle r="1.4" fill="#B5D4F4">
  <animateMotion dur="2.9s" repeatCount="indefinite" begin="9.1s"><mpath href="#sL1"/></animateMotion>
  <animate attributeName="opacity" values="0;0.7;0.7;0" dur="2.9s" repeatCount="indefinite" begin="9.1s"/>
</circle>

<!-- Stream L2: three dots -->
<circle r="3.8" fill="#85B7EB">
  <animateMotion dur="4.1s" repeatCount="indefinite" begin="1.7s"><mpath href="#sL2"/></animateMotion>
  <animate attributeName="opacity" values="0;1;1;0" dur="4.1s" repeatCount="indefinite" begin="1.7s"/>
</circle>
<circle r="2.2" fill="#B5D4F4">
  <animateMotion dur="2.1s" repeatCount="indefinite" begin="7.8s"><mpath href="#sL2"/></animateMotion>
  <animate attributeName="opacity" values="0;0.85;0.85;0" dur="2.1s" repeatCount="indefinite" begin="7.8s"/>
</circle>
<circle r="4.2" fill="#85B7EB">
  <animateMotion dur="3.3s" repeatCount="indefinite" begin="12.4s"><mpath href="#sL2"/></animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.3s" repeatCount="indefinite" begin="12.4s"/>
</circle>

<!-- Stream L3: two dots -->
<circle r="2.2" fill="#B5D4F4">
  <animateMotion dur="2.9s" repeatCount="indefinite" begin="3.4s"><mpath href="#sL3"/></animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.9s" repeatCount="indefinite" begin="3.4s"/>
</circle>
<circle r="3.4" fill="#85B7EB">
  <animateMotion dur="4.6s" repeatCount="indefinite" begin="8.3s"><mpath href="#sL3"/></animateMotion>
  <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4.6s" repeatCount="indefinite" begin="8.3s"/>
</circle>

<!-- Stream R1: three dots -->
<circle r="3.8" fill="#85B7EB">
  <animateMotion dur="3.3s" repeatCount="indefinite" begin="0.9s"><mpath href="#sR1"/></animateMotion>
  <animate attributeName="opacity" values="0;1;1;0" dur="3.3s" repeatCount="indefinite" begin="0.9s"/>
</circle>
<circle r="1.6" fill="#B5D4F4">
  <animateMotion dur="2.8s" repeatCount="indefinite" begin="6.5s"><mpath href="#sR1"/></animateMotion>
  <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2.8s" repeatCount="indefinite" begin="6.5s"/>
</circle>
<circle r="4.0" fill="#85B7EB">
  <animateMotion dur="3.9s" repeatCount="indefinite" begin="11.7s"><mpath href="#sR1"/></animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.9s" repeatCount="indefinite" begin="11.7s"/>
</circle>

<!-- Stream R2: two dots -->
<circle r="3.8" fill="#85B7EB">
  <animateMotion dur="2.6s" repeatCount="indefinite" begin="4.3s"><mpath href="#sR2"/></animateMotion>
  <animate attributeName="opacity" values="0;1;1;0" dur="2.6s" repeatCount="indefinite" begin="4.3s"/>
</circle>
<circle r="2.4" fill="#B5D4F4">
  <animateMotion dur="4.3s" repeatCount="indefinite" begin="10.2s"><mpath href="#sR2"/></animateMotion>
  <animate attributeName="opacity" values="0;0.85;0.85;0" dur="4.3s" repeatCount="indefinite" begin="10.2s"/>
</circle>

<!-- Stream R3: three dots -->
<circle r="2.2" fill="#B5D4F4">
  <animateMotion dur="4.7s" repeatCount="indefinite" begin="2.1s"><mpath href="#sR3"/></animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="4.7s" repeatCount="indefinite" begin="2.1s"/>
</circle>
<circle r="3.2" fill="#85B7EB">
  <animateMotion dur="3.9s" repeatCount="indefinite" begin="8.6s"><mpath href="#sR3"/></animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.9s" repeatCount="indefinite" begin="8.6s"/>
</circle>
<circle r="1.8" fill="#B5D4F4">
  <animateMotion dur="2.3s" repeatCount="indefinite" begin="13.9s"><mpath href="#sR3"/></animateMotion>
  <animate attributeName="opacity" values="0;0.75;0.75;0" dur="2.3s" repeatCount="indefinite" begin="13.9s"/>
</circle>

<!-- Eye outline -->
<path d="M-64,0 C-60,-16 -34,-38 0,-38 C34,-38 60,-16 64,0 C60,16 34,38 0,38 C-34,38 -60,16 -64,0Z" fill="none" stroke="#85B7EB" stroke-width="2.8"/>

<!-- Iris -->
<circle cx="0" cy="0" r="19" fill="none" stroke="#85B7EB" stroke-width="1.8"/>
<circle cx="0" cy="0" r="13" fill="none" stroke="#6AAAE6" stroke-width="0.9"/>

<!-- Pupil fill -->
<circle cx="0" cy="0" r="7" fill="#B5D4F4"/>

<!-- Pupil (dark) — looks around at incoming data -->
<circle r="2.5" fill="#1a1a1a">
  <animate attributeName="cx" values="3;-5;-4;4;5;3;-3;3" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  <animate attributeName="cy" values="-3;-4;3;-3;-2;3;-1;-3" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
</circle>

</svg>
