<svg width="200" viewBox="-150 -50 300 100" xmlns="http://www.w3.org/2000/svg">

<!-- Data stream paths (static) -->
<path id="streamL1" d="M-138,-44 C-112,-38 -84,-20 -64,-2" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="streamL2" d="M-148,-14 C-116,-10 -84,-4 -64,0" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="streamL3" d="M-138,22 C-112,18 -84,10 -64,2" fill="none" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round"/>
<path id="streamR1" d="M138,-44 C112,-38 84,-20 64,-2" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="streamR2" d="M148,-14 C116,-10 84,-4 64,0" fill="none" stroke="#85B7EB" stroke-width="2" stroke-linecap="round"/>
<path id="streamR3" d="M138,22 C112,18 84,10 64,2" fill="none" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round"/>

<!-- Animated dots — left side, moving toward eye -->
<circle r="2.2" fill="#B5D4F4" opacity="0.8">
  <animateMotion dur="3s" repeatCount="indefinite" begin="0s">
    <mpath href="#streamL1"/>
  </animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3s" repeatCount="indefinite" begin="0s"/>
</circle>
<circle r="3.8" fill="#85B7EB" opacity="0.8">
  <animateMotion dur="3.5s" repeatCount="indefinite" begin="0.8s">
    <mpath href="#streamL2"/>
  </animateMotion>
  <animate attributeName="opacity" values="0;1;1;0" dur="3.5s" repeatCount="indefinite" begin="0.8s"/>
</circle>
<circle r="2.2" fill="#B5D4F4" opacity="0.8">
  <animateMotion dur="3.2s" repeatCount="indefinite" begin="1.5s">
    <mpath href="#streamL3"/>
  </animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.2s" repeatCount="indefinite" begin="1.5s"/>
</circle>

<!-- Animated dots — right side, moving toward eye -->
<circle r="3.8" fill="#85B7EB" opacity="0.8">
  <animateMotion dur="3.3s" repeatCount="indefinite" begin="0.3s">
    <mpath href="#streamR1"/>
  </animateMotion>
  <animate attributeName="opacity" values="0;1;1;0" dur="3.3s" repeatCount="indefinite" begin="0.3s"/>
</circle>
<circle r="3.8" fill="#85B7EB" opacity="0.8">
  <animateMotion dur="3s" repeatCount="indefinite" begin="1.2s">
    <mpath href="#streamR2"/>
  </animateMotion>
  <animate attributeName="opacity" values="0;1;1;0" dur="3s" repeatCount="indefinite" begin="1.2s"/>
</circle>
<circle r="2.2" fill="#B5D4F4" opacity="0.8">
  <animateMotion dur="3.6s" repeatCount="indefinite" begin="0.6s">
    <mpath href="#streamR3"/>
  </animateMotion>
  <animate attributeName="opacity" values="0;0.9;0.9;0" dur="3.6s" repeatCount="indefinite" begin="0.6s"/>
</circle>

<!-- Eye outline -->
<path d="M-64,0 C-60,-16 -34,-38 0,-38 C34,-38 60,-16 64,0 C60,16 34,38 0,38 C-34,38 -60,16 -64,0Z" fill="none" stroke="#85B7EB" stroke-width="2.8"/>

<!-- Iris -->
<circle cx="0" cy="0" r="19" fill="none" stroke="#85B7EB" stroke-width="1.8"/>
<circle cx="0" cy="0" r="13" fill="none" stroke="#6AAAE6" stroke-width="0.9"/>

<!-- Pupil fill -->
<circle cx="0" cy="0" r="7" fill="#B5D4F4"/>

<!-- Pupil (dark) — looks around at incoming data -->
<circle r="2.5" fill="#1a1a1a">
  <animate attributeName="cx" values="3;-5;-4;4;5;3;-3;3" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
  <animate attributeName="cy" values="-3;-4;3;-3;-2;3;-1;-3" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
</circle>

</svg>
